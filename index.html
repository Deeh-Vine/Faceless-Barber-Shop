<!doctype html>
<html lang="en" class="scroll-smooth no-scrollbar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./build/output.css" />
    <title>Faceless Barbershop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mona+Sans:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="dark:bg-barber-deepnavy overflow-x-hidden dark:text-white font-mona h-[1000px]"
  >
    <header
      class="bg-slate-400/60 backdrop-blur-lg border-b border-barber-gold-light min-w-screen dark:bg-white/10 sticky top-0 z-50 p-4"
    >
      <section
        class="px-4 flex items-center justify-between max-w-full text-slate-950 dark:text-white"
      >
        <a href=""
          ><div class="flex items-center">
            <img
              src="images/FacelessBarber.webp"
              alt="Faceless logo"
              class="size-12 inline-block mr-2"
            />
            <h1
              class="text-slate-900 dark:text-white text-3xl font-dm-serif font-semibold dark:font-medium tracking-[2px]"
            >
              Faceless
            </h1>
          </div></a
        >

        <nav class="hidden md:inline-block">
          <ul
            class="text-slate-900 dark:text-white flex gap-5 text-lg font-mona font-semibold dark:font-medium"
          >
            <li><a href="#Home" class="hover:text-barber-gold">HOME</a></li>
            <li>
              <a href="#Services" class="hover:text-barber-gold">SERVICES</a>
            </li>
            <li>
              <a href="#Testimonials" class="hover:text-barber-gold"
                >TESTIMONIALS</a
              >
            </li>
            <li><a href="#About" class="hover:text-barber-gold">ABOUT</a></li>
            <li>
              <a
                href="#Contact"
                class="text-barber-espresso-700 hover:text-barber-gold font-bold dark:text-barber-gold dark:hover:text-barber-gold-light"
                >CONTACT</a
              >
            </li>
          </ul>
        </nav>
        <button
          id="menu-trigger"
          type="button"
          aria-label="Toggle navigation menu"
          class="group relative w-10 h-10 flex flex-col justify-center items-center gap-1.5 md:hidden [&.is-active]:rotate-[720deg] transition-transform duration-500 [&.is-active]:gap-0"
        >
          <!-- Top Bun: Moves down 9 pixels and tilts forward 45 degrees -->
          <span
            class="bg-slate-900 w-8 h-[3px] dark:bg-white rounded transition-transform duration-500 group-[.is-active]:rotate-45"
          ></span>

          <!-- Meat: Fades away to 0 opacity -->
          <span
            class="bg-slate-900 w-8 h-[3px] dark:bg-white rounded transition-opacity duration-500 group-[.is-active]:opacity-0"
          ></span>

          <!-- Bottom Bun: Moves up 9 pixels and tilts backward 45 degrees -->
          <span
            class="bg-slate-900 w-8 h-[3px] dark:bg-white rounded transition-transform duration-500 group-[.is-active]:-rotate-45"
          ></span>
        </button>

        <button
          class="bg-barber-espresso-900 text-white font-semibold py-2 px-4 rounded-3xl hover:bg-barber-espresso-700 dark:bg-barber-gold dark:hover:bg-barber-gold-light hidden lg:inline-block"
        >
          WHATSAPP
        </button>
      </section>
    </header>

    <nav
      id="nav-drop-down"
      class="hidden flex-col items-center left-0 bg-slate-950/80 backdrop-blur-md min-w-full fixed inset-16 pt-32 min-h-screen py-14 origin-top animate-bounces z-40"
    >
      <a
        href="#"
        class="font-bebas tracking-[3px] text-white text-4xl dark:text-[#eee5e2] hover:text-barber-gold-light hover:scale-x-125 py-6 px-4"
        >Home</a
      >
      <a
        href="#"
        class="font-bebas tracking-[3px] text-white text-4xl dark:text-[#eee5e2] hover:text-barber-gold-light hover:scale-x-125 py-6 px-4"
        >Services</a
      >
      <a
        href="#"
        class="font-bebas tracking-[3px] text-white text-4xl dark:text-[#eee5e2] hover:text-barber-gold-light hover:scale-x-125 py-6 px-4"
        >About</a
      >
      <a
        href="#"
        class="font-bebas tracking-[3px] text-white text-4xl dark:text-[#eee5e2] hover:text-barber-gold-light hover:scale-x-125 py-6 px-4"
        >Contact</a
      >
    </nav>
    <main class="bg-slate-200 w-full items-center dark:bg-slate-950">
      <section
        class="flex flex-col min-w-full px-4 items-center justify-center gap-2 min-h-[80vh] md:min-h-screen sm:px-10"
      >
          <article
            class="mt-32 flex flex-wrap items-center max-w-xl text-center"
          >
            <h1
              class="text-slate-900 text-5xl font-black mb-4 font-mona tracking-wider sm:tracking-widest dark:text-[#eee5e2] items-start md:text-7xl lg:text-right"
            >
              WELCOME TO
              <span class="text-barber-espresso-800 dark:text-barber-gold italic"
                >FACELESS</span
              >
              BARBERSHOP
            </h1>
            <p
              class="mb-4 mx-2 text-center font-medium text-barber-espresso-900/70 text-lg dark:text-barber-gold-light/60"
            >
              Barbering at Your Doorstep. Experience premium grooming without
              leaving home or campus.
            </p>
          </article>
          <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a
              href="https://wa.me/+2348080602782"
              class="bg-barber-espresso-900 hover:bg-barber-espresso-700 dark:bg-barber-gold text-white px-8 py-4 rounded-xl font-bold text-lg hover:shadow-2xl dark:hover:to-barber-gold-light transition-all flex items-center justify-center gap-2"
            >
              Book Now via WhatsApp
            </a>
            <a
              href="#"
              class="flex items-center justify-center self-center border-2 border-barber-gold-light text-onyx dark:text-white px-16 py-4 sm:px-8 rounded-xl font-bold text-lg hover:bg-barber-gold-light/10 transition-all"
            >
              View Gallery
            </a>
          </div>
          <div
            class="mt-10 m-8 inline-flex items-center gap-2 bg-sand/20 dark:bg-barber-gold-light/10 px-4 py-2 rounded-full border border-sand/30"
          >
            <span class="relative flex h-3 w-3">
              <span
                class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-500 opacity-75"
              ></span>
              <span
                class="relative inline-flex rounded-full h-3 w-3 bg-green-600"
              ></span>
            </span>
            <span
              class="text-base font-medium italic text-barber-espresso-900/70 dark:text-barber-gold-light/60 flex flex-nowrap whitespace-nowrap"
              >Active in Unilorin: Kikelomo Hostel Area</span
            >
          </div>
      </section>

      <section
        class="bg-barber-light dark:bg-slate-900 min-w-full p-7 justify-center items-center gap-20 min-h-[80vh] lg:justify-between md:min-h-screen"
      >
        <div></div>
        <div></div>
      </section>
    </main>
  </body>
</html>
<script>
  const hamburger = document.getElementById("menu-trigger");
  const menu = document.getElementById("nav-drop-down");

  hamburger.addEventListener("click", () => {
    hamburger.classList.toggle("is-active");
    menu.classList.toggle("hidden");
    menu.classList.toggle("flex");
  });
</script>
